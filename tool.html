<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页快捷方式生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            color: #9ca3af;
            font-size: 14px;
            margin-top: 4px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .icon-input {
            padding-left: 44px;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            pointer-events: none;
        }

        .icon-input-wrapper {
            display: flex;
            gap: 8px;
        }

        .icon-input-wrapper input {
            flex: 1;
        }

        .btn-fetch-icon {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 16px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn-fetch-icon:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px -3px rgba(16, 185, 129, 0.4);
        }

        .btn-fetch-icon:active {
            transform: translateY(0);
        }

        .btn-fetch-icon:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-fetch-icon.loading svg {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #4b5563;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-reset {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            color: white;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(249, 115, 22, 0.4);
        }

        .result-section {
            margin-top: 28px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .result-section.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .result-title {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
        }

        .result-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 8px 14px;
            font-size: 13px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .btn-copy-result {
            background: #10b981;
            color: white;
        }

        .btn-copy-result:hover {
            background: #059669;
        }

        .btn-copy-line {
            background: #6366f1;
            color: white;
        }

        .btn-copy-line:hover {
            background: #4f46e5;
        }

        .result-box {
            background: #1e293b;
            border-radius: 12px;
            padding: 16px;
            position: relative;
            border: 1px solid #334155;
        }

        .result-box pre {
            color: #e2e8f0;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.8;
            white-space: pre;
            overflow-x: auto;
        }

        .result-box pre::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .result-box pre::-webkit-scrollbar-track {
            background: #1e293b;
        }

        .result-box pre::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        .result-box pre::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        .line-numbers {
            color: #475569;
            user-select: none;
            margin-right: 16px;
            text-align: right;
        }

        .code-container {
            display: flex;
        }

        .code-content {
            flex: 1;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #10b981;
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .icon-preview {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            object-fit: contain;
            background: #f3f4f6;
            padding: 6px;
        }

        .preview-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 20px;
            padding: 16px;
            background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
            border-radius: 12px;
            display: none;
        }

        .preview-row.show {
            display: flex;
        }

        .preview-info {
            flex: 1;
        }

        .preview-info h3 {
            font-size: 16px;
            color: #1f2937;
            margin-bottom: 4px;
        }

        .preview-info p {
            font-size: 13px;
            color: #6b7280;
        }

        .preview-info span {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            margin-top: 6px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .btn-group {
                flex-direction: column;
            }

            .result-actions {
                flex-direction: column;
                width: 100%;
            }

            .btn-small {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>网页快捷方式生成器</h1>
            <p>快速生成网页书签快捷方式配置</p>
        </div>

        <form id="linkForm">
            <div class="form-row">
                <div class="form-group">
                    <label>名称</label>
                    <input type="text" id="name" placeholder="输入网站名称" required>
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <input type="text" id="category" placeholder="如：社交、工具、新闻">
                </div>
            </div>

            <div class="form-group">
                <label>网站地址</label>
                <input type="url" id="url" placeholder="https://example.com" required>
            </div>

            <div class="form-group">
                <label>图标地址</label>
                <div class="icon-input-wrapper">
                    <input type="url" id="icon" placeholder="https://example.com/favicon.ico">
                    <button type="button" class="btn-fetch-icon" onclick="fetchFavicon()" id="fetchIconBtn" title="从网址获取图标">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M2 12h20"/>
                            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                        </svg>
                        <span>获取图标</span>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label>简介</label>
                <textarea id="description" placeholder="简短描述网站内容..."></textarea>
            </div>

            <div class="btn-group">
                <button type="button" class="btn btn-reset" onclick="resetForm()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                    </svg>
                    重置
                </button>
                <button type="submit" class="btn btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    生成代码
                </button>
            </div>
        </form>

        <div class="preview-row" id="previewRow">
            <img src="" alt="icon" class="icon-preview" id="previewIcon">
            <div class="preview-info">
                <h3 id="previewName"></h3>
                <p id="previewUrl"></p>
                <span id="previewCategory"></span>
            </div>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-header">
                <span class="result-title">生成结果</span>
                <div class="result-actions">
                    <button class="btn-small btn-copy-line" onclick="copyLineCode()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        单行格式
                    </button>
                    <button class="btn-small btn-copy-result" onclick="copyResult()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2"/>
                            <path d="M5 15V5a2 2 0 0 1 2-2h10"/>
                        </svg>
                        复制代码
                    </button>
                </div>
            </div>
            <div class="result-box">
                <div class="code-container">
                    <div class="line-numbers" id="lineNumbers"></div>
                    <div class="code-content">
                        <pre id="resultOutput"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">已复制到剪贴板！</div>

    <script>
        let generatedCode = '';
        let lineCode = '';

        document.getElementById('linkForm').addEventListener('submit', function(e) {
            e.preventDefault();
            generateCode();
        });

        function generateCode() {
            const name = document.getElementById('name').value.trim();
            const url = document.getElementById('url').value.trim();
            const icon = document.getElementById('icon').value.trim();
            const category = document.getElementById('category').value.trim();
            const description = document.getElementById('description').value.trim();

            if (!name || !url) {
                showToast('请填写名称和网址', '#ef4444');
                return;
            }

            // 源码格式 - { 和 } 对齐，可直接复制到源码
            generatedCode = `{\n                name: "${name}",\n                url: "${url}",\n                icon: "${icon}",\n                category: "${category}",\n                description: "${description}"\n            },`;

            // 单行压缩格式（带逗号）
            lineCode = `{ name: "${name}", url: "${url}", icon: "${icon}", category: "${category}", description: "${description}" },`;

            document.getElementById('resultOutput').textContent = generatedCode;
            
            // 更新行号
            const lines = generatedCode.split('\n');
            const lineNumbers = lines.map((_, i) => i + 1).join('\n');
            document.getElementById('lineNumbers').textContent = lineNumbers;
            
            document.getElementById('resultSection').classList.add('show');

            // 更新预览
            const previewRow = document.getElementById('previewRow');
            document.getElementById('previewName').textContent = name;
            document.getElementById('previewUrl').textContent = url;
            document.getElementById('previewCategory').textContent = category || '未分类';

            const previewIcon = document.getElementById('previewIcon');
            if (icon) {
                previewIcon.src = icon;
                previewIcon.style.display = 'block';
                previewRow.classList.add('show');
            } else {
                previewIcon.style.display = 'none';
                previewRow.classList.remove('show');
            }

            showToast('生成成功！');
        }

        function copyResult() {
            if (!generatedCode) {
                showToast('请先生成内容', '#ef4444');
                return;
            }

            copyToClipboard(generatedCode).then(() => {
                showToast('已复制缩进格式代码！');
            });
        }

        function copyLineCode() {
            if (!lineCode) {
                showToast('请先生成内容', '#ef4444');
                return;
            }

            copyToClipboard(lineCode).then(() => {
                showToast('已复制单行格式代码！');
            });
        }

        function copyToClipboard(text) {
            return navigator.clipboard.writeText(text).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
            });
        }

        function resetForm() {
            document.getElementById('linkForm').reset();
            document.getElementById('resultSection').classList.remove('show');
            document.getElementById('previewRow').classList.remove('show');
            generatedCode = '';
            lineCode = '';
            showToast('已重置表单', '#6366f1');
        }

        function showToast(message, bgColor = '#10b981') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = bgColor;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        async function fetchFavicon() {
            const urlInput = document.getElementById('url').value.trim();
            const iconInput = document.getElementById('icon');
            const fetchBtn = document.getElementById('fetchIconBtn');

            if (!urlInput) {
                showToast('请先填写网站地址', '#ef4444');
                return;
            }

            // 提取域名
            let domain;
            try {
                const urlObj = new URL(urlInput);
                domain = urlObj.hostname;
            } catch {
                showToast('请输入有效的网址', '#ef4444');
                return;
            }

            // 禁用按钮并显示加载状态
            fetchBtn.disabled = true;
            fetchBtn.classList.add('loading');
            const originalText = fetchBtn.querySelector('span').textContent;
            fetchBtn.querySelector('span').textContent = '获取中...';

            // 尝试多个 favicon API (国内可访问的)
            const faviconApis = [
                `https://favicon.im/${domain}`,
                `https://logo.clearbit.com/${domain}`,
                `https://www.iconshog.com/favicon/${domain}`
            ];

            // 先尝试 favicon.im (国内友好)
            try {
                const img = new Image();
                
                const tryNextApi = (apiIndex) => {
                    if (apiIndex >= faviconApis.length) {
                        // 所有 API 都失败，尝试直接获取网站的 favicon.ico
                        const directFavicon = `${window.location.protocol}//${domain}/favicon.ico`;
                        iconInput.value = directFavicon;
                        fetchBtn.disabled = false;
                        fetchBtn.classList.remove('loading');
                        fetchBtn.querySelector('span').textContent = originalText;
                        showToast('已使用网站默认图标');
                        return;
                    }
                    
                    img.onload = () => {
                        iconInput.value = faviconApis[apiIndex];
                        fetchBtn.disabled = false;
                        fetchBtn.classList.remove('loading');
                        fetchBtn.querySelector('span').textContent = originalText;
                        showToast('图标获取成功！');
                    };
                    img.onerror = () => {
                        tryNextApi(apiIndex + 1);
                    };
                    img.src = faviconApis[apiIndex];
                };
                
                tryNextApi(0);
            } catch {
                fetchBtn.disabled = false;
                fetchBtn.classList.remove('loading');
                fetchBtn.querySelector('span').textContent = originalText;
                showToast('获取图标失败', '#ef4444');
            }
        }
    </script>
</body>
</html>
