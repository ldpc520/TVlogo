<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电脑装机配置清单</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #2c6fd1 0%, #1e4db5 100%);
            color: white;
            padding: 25px 30px;
            border-bottom: 4px solid #1a3f8c;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        
        h1 i {
            margin-right: 12px;
            font-size: 32px;
        }
        
        .subtitle {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background-color: #f9fafc;
            border-bottom: 1px solid #eaeef5;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        
        .primary-btn {
            background-color: #2c6fd1;
            color: white;
        }
        
        .primary-btn:hover {
            background-color: #1e5ab8;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(44, 111, 209, 0.3);
        }
        
        .secondary-btn {
            background-color: #f0f4ff;
            color: #2c6fd1;
            border: 1px solid #d0ddf5;
        }
        
        .secondary-btn:hover {
            background-color: #e1e9ff;
        }
        
        .danger-btn {
            background-color: #ff4757;
            color: white;
        }
        
        .danger-btn:hover {
            background-color: #ff3742;
        }
        
        .success-btn {
            background-color: #2ed573;
            color: white;
        }
        
        .success-btn:hover {
            background-color: #25c464;
        }
        
        .stats {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 16px;
        }
        
        .total-price {
            font-weight: 600;
            color: #2c6fd1;
            font-size: 20px;
        }
        
        .table-container {
            padding: 20px 30px 30px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        
        thead {
            background-color: #f1f5fd;
        }
        
        /* 网页表头行高固定为50px */
        th {
            padding: 0 15px;
            text-align: left;
            font-weight: 600;
            color: #2c3e50;
            border-bottom: 2px solid #e1e8f0;
            font-size: 16px;
            height: 50px; /* 网页表头行高固定为50px */
            vertical-align: middle;
        }
        
        /* 网页表格内容行高固定为40px */
        td {
            padding: 0 15px;
            border-bottom: 1px solid #eef2f7;
            height: 40px; /* 网页表格内容行高固定为40px */
            vertical-align: middle;
        }
        
        tbody tr:hover {
            background-color: #f9fbfe;
        }
        
        .part-type {
            font-weight: 500;
            color: #2c3e50;
        }
        
        input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d1d9e6;
            border-radius: 4px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #2c6fd1;
            box-shadow: 0 0 0 2px rgba(44, 111, 209, 0.1);
        }
        
        .price-input {
            text-align: right;
        }
        
        .serial {
            width: 60px;
            text-align: center;
            font-weight: 500;
            color: #5a6c7d;
        }
        
        .part-type-col {
            width: 180px;
        }
        
        .model-col {
            min-width: 300px;
        }
        
        .price-col {
            width: 150px;
        }
        
        .actions-col {
            width: 100px;
        }
        
        .action-btn {
            background: none;
            border: none;
            color: #5a6c7d;
            padding: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .action-btn:hover {
            color: #2c6fd1;
        }
        
        .total-row {
            background-color: #f8fafd;
            font-weight: 600;
        }
        
        .total-row td {
            padding: 0 15px;
            font-size: 16px;
            height: 50px; /* 总计行也使用较高行高 */
        }
        
        .footer {
            padding: 20px 30px;
            background-color: #f9fafc;
            border-top: 1px solid #eaeef5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #5a6c7d;
        }
        
        .export-note {
            font-size: 14px;
            color: #7b8a9b;
        }
        
        .export-note i {
            color: #2c6fd1;
            margin-right: 5px;
        }
        
        .error {
            border-color: #ff4757 !important;
        }
        
        .error-message {
            color: #ff4757;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
        
        @media (max-width: 768px) {
            .container {
                border-radius: 8px;
            }
            
            header, .controls, .table-container, .footer {
                padding: 15px;
            }
            
            .controls {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
            
            .button-group {
                width: 100%;
                justify-content: space-between;
            }
            
            .stats {
                width: 100%;
                justify-content: space-between;
            }
            
            th, td {
                padding: 0 8px;
            }
            
            /* 移动端保持相同的行高设置 */
            th {
                height: 50px; /* 移动端表头行高 */
            }
            
            td {
                height: 40px; /* 移动端表格内容行高 */
            }
            
            .serial {
                width: 40px;
            }
            
            .part-type-col {
                width: 120px;
            }
            
            .model-col {
                min-width: 200px;
            }
        }
        
        .empty-row {
            text-align: center;
            color: #7b8a9b;
            height: 40px; /* 空行也使用相同的行高 */
        }
        
        .delete-btn {
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 5px 10px;
            font-size: 13px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .delete-btn:hover {
            background-color: #ff4757;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-desktop"></i> 电脑装机配置清单</h1>
            <p class="subtitle">填写您的电脑配件信息，系统将自动计算总价并支持导出到Word文档</p>
        </header>
        
        <div class="controls">
            <div class="button-group">
                <button class="primary-btn" id="addRowBtn">
                    <i class="fas fa-plus"></i> 添加配件
                </button>
                <button class="secondary-btn" id="resetBtn">
                    <i class="fas fa-redo"></i> 重置
                </button>
                <button class="success-btn" id="exportBtn">
                    <i class="fas fa-file-word"></i> 导出到Word
                </button>
            </div>
            
            <div class="stats">
                <div>已配置项目: <span id="configuredCount">0</span>/<span id="totalCount">14</span></div>
                <div>总计: <span class="total-price" id="totalPrice">0</span> 元</div>
            </div>
        </div>
        
        <div class="table-container">
            <table id="configTable">
                <thead>
                    <tr>
                        <th class="serial">序号</th>
                        <th class="part-type-col">配件类型</th>
                        <th class="model-col">型号</th>
                        <th class="price-col">单价(元)</th>
                        <th class="actions-col">操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- 表格行将通过JavaScript动态生成 -->
                </tbody>
                <tfoot>
                    <tr class="total-row">
                        <td colspan="3" style="text-align: right;">合计</td>
                        <td id="totalCell">0</td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>
        
        <div class="footer">
            <div class="export-note">
                <i class="fas fa-info-circle"></i> 提示：只有型号和单价都有输入内容的行才会被导出到Word文档
            </div>
            <div>© 2026 电脑装机配置工具</div>
        </div>
    </div>

    <script>
        // 初始配置数据
        const initialConfig = [
            { id: 1, type: "CPU", model: "", price: "" },
            { id: 2, type: "CPU散热器", model: "", price: "" },
            { id: 3, type: "主板", model: "", price: "" },
            { id: 4, type: "内存", model: "", price: "" },
            { id: 5, type: "硬盘(主)", model: "", price: "" },
            { id: 6, type: "硬盘(副)", model: "", price: "" },
            { id: 7, type: "显卡", model: "", price: "" },
            { id: 8, type: "电源", model: "", price: "" },
            { id: 9, type: "机箱", model: "", price: "" },
            { id: 10, type: "机箱风扇", model: "", price: "" },
            { id: 11, type: "键盘", model: "", price: "" },
            { id: 12, type: "鼠标", model: "", price: "" },
            { id: 13, type: "显示器", model: "", price: "" },
            { id: 14, type: "音响", model: "", price: "" }
        ];

        // 当前配置数据
        let configData = JSON.parse(JSON.stringify(initialConfig));
        let nextId = 15; // 用于新增行的ID

        // DOM元素
        const tableBody = document.getElementById('tableBody');
        const totalPriceElement = document.getElementById('totalPrice');
        const totalCell = document.getElementById('totalCell');
        const configuredCountElement = document.getElementById('configuredCount');
        const totalCountElement = document.getElementById('totalCount');
        const addRowBtn = document.getElementById('addRowBtn');
        const resetBtn = document.getElementById('resetBtn');
        const exportBtn = document.getElementById('exportBtn');

        // 初始化表格
        function initTable() {
            tableBody.innerHTML = '';
            totalCountElement.textContent = configData.length;
            
            configData.forEach(item => {
                addRowToTable(item);
            });
            
            updateStats();
        }

        // 添加行到表格
        function addRowToTable(item) {
            const row = document.createElement('tr');
            row.id = `row-${item.id}`;
            
            // 创建序号单元格
            const serialCell = document.createElement('td');
            serialCell.className = 'serial';
            serialCell.textContent = item.id;
            
            // 创建配件类型单元格
            const typeCell = document.createElement('td');
            typeCell.className = 'part-type';
            typeCell.textContent = item.type;
            
            // 创建型号输入单元格
            const modelCell = document.createElement('td');
            const modelInput = document.createElement('input');
            modelInput.type = 'text';
            modelInput.className = 'model-input';
            modelInput.value = item.model;
            modelInput.placeholder = '请输入型号';
            modelInput.dataset.id = item.id;
            modelCell.appendChild(modelInput);
            
            // 创建单价输入单元格
            const priceCell = document.createElement('td');
            const priceInput = document.createElement('input');
            priceInput.type = 'text';
            priceInput.className = 'price-input';
            priceInput.value = item.price;
            priceInput.placeholder = '0';
            priceInput.dataset.id = item.id;
            priceCell.appendChild(priceInput);
            
            // 添加错误消息元素
            const errorElement = document.createElement('div');
            errorElement.className = 'error-message';
            errorElement.id = `error-${item.id}`;
            priceCell.appendChild(errorElement);
            
            // 创建操作单元格 - 所有行都有删除按钮
            const actionsCell = document.createElement('td');
            actionsCell.className = 'actions-col';
            
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i> 删除';
            deleteBtn.title = '删除此行';
            deleteBtn.onclick = () => deleteRow(item.id);
            actionsCell.appendChild(deleteBtn);
            
            // 组装行
            row.appendChild(serialCell);
            row.appendChild(typeCell);
            row.appendChild(modelCell);
            row.appendChild(priceCell);
            row.appendChild(actionsCell);
            
            // 添加到表格
            tableBody.appendChild(row);
            
            // 添加事件监听
            modelInput.addEventListener('input', handleModelInput);
            priceInput.addEventListener('input', handlePriceInput);
            priceInput.addEventListener('blur', validatePrice);
        }

        // 处理型号输入
        function handleModelInput(e) {
            const id = parseInt(e.target.dataset.id);
            const item = configData.find(item => item.id === id);
            if (item) {
                item.model = e.target.value.trim();
                updateStats();
            }
        }

        // 处理单价输入
        function handlePriceInput(e) {
            const id = parseInt(e.target.dataset.id);
            const item = configData.find(item => item.id === id);
            if (item) {
                // 只允许输入数字
                const value = e.target.value.replace(/[^\d]/g, '');
                e.target.value = value;
                item.price = value;
                
                // 清除错误状态
                e.target.classList.remove('error');
                const errorElement = document.getElementById(`error-${id}`);
                errorElement.style.display = 'none';
                
                updateTotal();
                updateStats();
            }
        }

        // 验证单价
        function validatePrice(e) {
            const id = parseInt(e.target.dataset.id);
            const value = e.target.value;
            const errorElement = document.getElementById(`error-${id}`);
            
            if (value && !/^\d+$/.test(value)) {
                e.target.classList.add('error');
                errorElement.textContent = '请输入整数';
                errorElement.style.display = 'block';
                return false;
            } else if (value && parseInt(value) < 0) {
                e.target.classList.add('error');
                errorElement.textContent = '单价不能为负数';
                errorElement.style.display = 'block';
                return false;
            } else {
                e.target.classList.remove('error');
                errorElement.style.display = 'none';
                return true;
            }
        }

        // 更新总计
        function updateTotal() {
            let total = 0;
            configData.forEach(item => {
                if (item.price && !isNaN(parseInt(item.price))) {
                    total += parseInt(item.price);
                }
            });
            
            totalPriceElement.textContent = total.toLocaleString();
            totalCell.textContent = total.toLocaleString() + ' 元';
        }

        // 更新统计信息
        function updateStats() {
            const configured = configData.filter(item => item.model && item.price).length;
            configuredCountElement.textContent = configured;
            updateTotal();
        }

        // 添加新行
        function addNewRow() {
            const newItem = {
                id: nextId++,
                type: "其他配件",
                model: "",
                price: ""
            };
            
            configData.push(newItem);
            addRowToTable(newItem);
            updateStats();
            
            // 滚动到新行
            const newRow = document.getElementById(`row-${newItem.id}`);
            newRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            
            // 聚焦到型号输入
            const modelInput = newRow.querySelector('.model-input');
            modelInput.focus();
        }

        // 删除行
        function deleteRow(id) {
            if (configData.length <= 1) {
                alert('至少需要保留一行配置');
                return;
            }
            
            if (confirm('确定要删除这一行配置吗？')) {
                configData = configData.filter(item => item.id !== id);
                const row = document.getElementById(`row-${id}`);
                if (row) row.remove();
                updateStats();
            }
        }

        // 重置表格
        function resetTable() {
            if (confirm('确定要重置所有数据吗？此操作不可撤销。')) {
                configData = JSON.parse(JSON.stringify(initialConfig));
                nextId = 15;
                initTable();
            }
        }

        // 导出到Word
        function exportToWord() {
            // 过滤出有内容的行
            const validRows = configData.filter(item => item.model && item.price);
            
            if (validRows.length === 0) {
                alert('没有可导出的数据，请至少填写一行完整的型号和单价信息。');
                return;
            }
            
            // 计算总计
            const total = validRows.reduce((sum, item) => sum + parseInt(item.price), 0);
            
            // 创建Word文档的HTML内容
            const htmlContent = `
            <!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <style>
                    body {
                        font-family: 'Microsoft YaHei', sans-serif;
                        margin: 0;
                        padding: 20px;
                    }
                    .document-title {
                        text-align: center;
                        color: #2c6fd1;
                        font-size: 24px;
                        margin-bottom: 20px;
                        padding-bottom: 10px;
                        border-bottom: 2px solid #2c6fd1;
                    }
                    table {
                        width: 100%;
                        border-collapse: collapse;
                        table-layout: fixed;
                        font-size: 12pt;
                        margin-top: 10px;
                    }
                    th {
                        background-color: #f1f5fd;
                        padding: 0 8px;
                        text-align: center; /* 表头单元格居中 */
                        font-weight: bold;
                        border: 1px solid #ddd;
                        height: 50px; /* Word文档表头行高固定为50px */
                        vertical-align: middle; /* 垂直居中 */
                    }
                    td {
                        padding: 0 8px;
                        border: 1px solid #ddd;
                        text-align: center; /* 表格内容单元格居中 */
                        vertical-align: middle; /* 垂直居中 */
                        height: 40px; /* Word文档表格内容行高固定为40px */
                    }
                    .total-row {
                        font-weight: bold;
                        background-color: #f8fafd;
                    }
                    .total-row td {
                        height: 50px; /* 总计行行高 */
                    }
                    .footer {
                        text-align: right;
                        margin-top: 30px;
                        color: #666;
                        font-size: 11pt;
                    }
                </style>
            </head>
            <body>
                <h1 class="document-title">电脑装机配置清单</h1>
                <table>
                    <thead>
                        <tr>
                            <th style="width: 8%">序号</th>
                            <th style="width: 20%">配件类型</th>
                            <th style="width: 52%">型号</th>
                            <th style="width: 20%">单价(元)</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${validRows.map((item, index) => `
                        <tr>
                            <td>${index + 1}</td>
                            <td>${item.type}</td>
                            <td>${item.model}</td>
                            <td>${parseInt(item.price).toLocaleString()}</td>
                        </tr>
                        `).join('')}
                        <tr class="total-row">
                            <td colspan="3" style="text-align: right;">合计</td>
                            <td>${total.toLocaleString()} 元</td>
                        </tr>
                    </tbody>
                </table>
                <div class="footer">
                    生成时间: ${new Date().toLocaleString('zh-CN')} | 共 ${validRows.length} 项配置
                </div>
            </body>
            </html>
            `;
            
            // 创建Blob对象
            const blob = new Blob(['\ufeff' + htmlContent], { type: 'application/msword' });
            
            // 创建下载链接
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `电脑装机配置清单_${new Date().toISOString().slice(0, 10)}.doc`;
            
            // 触发下载
            document.body.appendChild(a);
            a.click();
            
            // 清理
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 0);
            
            alert(`成功导出 ${validRows.length} 项配置，总计 ${total.toLocaleString()} 元`);
        }

        // 事件监听
        addRowBtn.addEventListener('click', addNewRow);
        resetBtn.addEventListener('click', resetTable);
        exportBtn.addEventListener('click', exportToWord);

        // 初始化页面
        document.addEventListener('DOMContentLoaded', initTable);
    </script>
</body>
</html>
