<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favicon Grabber - 网站图标抓取工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-light: #e0e7ff;
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e1b4b;
            --card-bg: rgba(30, 27, 75, 0.6);
            --card-border: rgba(99, 102, 241, 0.2);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 640px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
            border-radius: 20px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4);
        }

        .logo svg {
            width: 36px;
            height: 36px;
            color: white;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .input-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            gap: 12px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .input-icon svg {
            width: 20px;
            height: 20px;
        }

        input[type="url"] {
            width: 100%;
            padding: 16px 16px 16px 48px;
            font-size: 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="url"]::placeholder {
            color: var(--text-muted);
        }

        input[type="url"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        button {
            padding: 16px 28px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        button svg {
            width: 20px;
            height: 20px;
        }

        .result-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 32px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .result-card.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .result-card.error {
            border-color: rgba(239, 68, 68, 0.3);
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .result-icon {
            width: 48px;
            height: 48px;
            background: var(--primary-light);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-icon svg {
            width: 24px;
            height: 24px;
            color: var(--primary);
        }

        .result-icon img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .result-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .result-subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .url-section {
            margin-top: 24px;
        }

        .url-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .url-box {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .url-text {
            flex: 1;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.9rem;
            color: var(--text-primary);
            word-break: break-all;
        }

        .copy-btn {
            padding: 10px 16px;
            font-size: 0.875rem;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 8px;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .copy-btn:hover {
            background: rgba(99, 102, 241, 0.25);
        }

        .copy-btn.copied {
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.3);
            color: var(--success);
        }

        .copy-btn svg {
            width: 16px;
            height: 16px;
        }

        .preview-section {
            margin-top: 24px;
            text-align: center;
        }

        .preview-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .preview-image {
            display: inline-block;
            padding: 24px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .preview-image img {
            width: 64px;
            height: 64px;
            object-fit: contain;
        }

        .error-message {
            color: var(--error);
            font-size: 0.9rem;
            text-align: center;
            padding: 16px;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--card-border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hint {
            margin-top: 16px;
            padding: 12px 16px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 8px;
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-align: center;
        }

        .hint strong {
            color: var(--primary);
        }

        footer {
            margin-top: auto;
            padding-top: 48px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        @media (max-width: 640px) {
            body {
                padding: 24px 16px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .input-card, .result-card {
                padding: 24px;
            }

            .input-group {
                flex-direction: column;
            }

            button {
                width: 100%;
                justify-content: center;
            }

            .url-box {
                flex-direction: column;
                align-items: stretch;
            }

            .copy-btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
                </svg>
            </div>
            <h1>Favicon Grabber</h1>
            <p class="subtitle">输入任意网站，轻松获取网站图标</p>
        </header>

        <div class="input-card">
            <div class="input-group">
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                        </svg>
                    </span>
                    <input type="url" id="urlInput" placeholder="输入网站地址，如 https://github.com" />
                </div>
                <button id="grabBtn" onclick="grabFavicon()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                    </svg>
                    抓取图标
                </button>
            </div>
            <div class="hint">
                <strong>提示：</strong>支持任何网站，图标将自动从网站获取
            </div>
        </div>

        <div class="result-card" id="resultCard">
            <div class="result-header">
                <div class="result-icon" id="resultIcon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div>
                    <div class="result-title" id="resultTitle">图标抓取成功</div>
                    <div class="result-subtitle" id="resultSubtitle">以下是获取到的图标信息</div>
                </div>
            </div>

            <div class="preview-section" id="previewSection">
                <div class="preview-label">图标预览</div>
                <div class="preview-image">
                    <img id="faviconPreview" src="" alt="Favicon Preview" />
                </div>
            </div>

            <div class="url-section">
                <div class="url-label">图标地址</div>
                <div class="url-box">
                    <span class="url-text" id="faviconUrl"></span>
                    <button class="copy-btn" id="copyBtn" onclick="copyUrl()">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" id="copyIcon">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                        </svg>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" id="checkIcon" style="display:none;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                        </svg>
                        <span id="copyText">复制</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>输入网址，一键获取网站图标</p>
    </footer>

    <script>
        let currentFaviconUrl = '';

        async function grabFavicon() {
            const input = document.getElementById('urlInput');
            const btn = document.getElementById('grabBtn');
            const resultCard = document.getElementById('resultCard');

            let url = input.value.trim();

            if (!url) {
                showError('请输入网站地址');
                return;
            }

            // 添加协议
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
                input.value = url;
            }

            try {
                new URL(url);
            } catch {
                showError('请输入有效的网址');
                return;
            }

            // 显示加载状态
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 抓取中...';
            resultCard.classList.remove('visible', 'error');

            // 使用多个策略获取favicon
            const faviconUrl = await findFavicon(url);

            setTimeout(() => {
                btn.disabled = false;
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                    </svg>
                    抓取图标
                `;

                if (faviconUrl) {
                    showSuccess(faviconUrl);
                } else {
                    showError('无法获取该网站的图标');
                }
            }, 500);
        }

        async function findFavicon(siteUrl) {
            try {
                const url = new URL(siteUrl);
                const origin = url.origin;

                // 策略1: 直接尝试常见的favicon路径
                const commonPaths = [
                    '/favicon.ico',
                    '/apple-touch-icon.png',
                    '/apple-touch-icon-precomposed.png',
                    '/favicon.svg',
                    '/favicon.png',
                    '/assets/favicon.ico',
                    '/images/favicon.ico',
                    '/static/favicon.ico',
                    '/public/favicon.ico'
                ];

                // 先测试最可能的 favicon.ico
                const testUrl = origin + '/favicon.ico';
                const exists = await checkFaviconExists(testUrl);
                if (exists) {
                    return testUrl;
                }

                // 尝试其他常见路径
                for (const path of commonPaths.slice(1)) {
                    const testPath = origin + path;
                    const existsPath = await checkFaviconExists(testPath);
                    if (existsPath) {
                        return testPath;
                    }
                }

                // 策略2: 尝试 Google Favicon API (作为后备)
                const domain = url.hostname;
                const googleApiUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=256`;

                // 检查 Google API 是否可用
                const googleExists = await checkFaviconExists(googleApiUrl);
                if (googleExists) {
                    return googleApiUrl;
                }

                // 策略3: DuckDuckGo Favicon API
                const ddgApiUrl = `https://icons.duckduckgo.com/ip3/${domain}.ico`;
                return ddgApiUrl;

            } catch (e) {
                console.error('Error finding favicon:', e);
                return null;
            }
        }

        async function checkFaviconExists(url) {
            try {
                const response = await fetch(url, {
                    method: 'HEAD',
                    mode: 'no-cors'
                });
                // no-cors 模式下无法获取状态码，我们信任这个URL
                return true;
            } catch {
                return false;
            }
        }

        function showSuccess(faviconUrl) {
            const resultCard = document.getElementById('resultCard');
            const faviconPreview = document.getElementById('faviconPreview');
            const faviconUrlEl = document.getElementById('faviconUrl');
            const previewSection = document.getElementById('previewSection');

            currentFaviconUrl = faviconUrl;
            faviconPreview.src = faviconUrl;
            faviconUrlEl.textContent = faviconUrl;

            resultCard.classList.remove('error');
            previewSection.style.display = 'block';

            // 延迟显示以触发动画
            setTimeout(() => {
                resultCard.classList.add('visible');
            }, 50);
        }

        function showError(message) {
            const resultCard = document.getElementById('resultCard');
            const previewSection = document.getElementById('previewSection');
            const resultTitle = document.getElementById('resultTitle');

            resultTitle.textContent = '抓取失败';
            previewSection.style.display = 'none';
            resultCard.classList.add('error');

            setTimeout(() => {
                resultCard.classList.add('visible');
            }, 50);

            // 3秒后恢复
            setTimeout(() => {
                resultCard.classList.remove('visible');
            }, 3000);
        }

        async function copyUrl() {
            if (!currentFaviconUrl) return;

            const copyBtn = document.getElementById('copyBtn');
            const copyIcon = document.getElementById('copyIcon');
            const checkIcon = document.getElementById('checkIcon');
            const copyText = document.getElementById('copyText');

            try {
                await navigator.clipboard.writeText(currentFaviconUrl);

                copyBtn.classList.add('copied');
                copyIcon.style.display = 'none';
                checkIcon.style.display = 'block';
                copyText.textContent = '已复制';

                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyIcon.style.display = 'block';
                    checkIcon.style.display = 'none';
                    copyText.textContent = '复制';
                }, 2000);
            } catch (err) {
                // 后备方案
                const textarea = document.createElement('textarea');
                textarea.value = currentFaviconUrl;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);

                copyBtn.classList.add('copied');
                copyIcon.style.display = 'none';
                checkIcon.style.display = 'block';
                copyText.textContent = '已复制';

                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyIcon.style.display = 'block';
                    checkIcon.style.display = 'none';
                    copyText.textContent = '复制';
                }, 2000);
            }
        }

        // 回车键触发抓取
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                grabFavicon();
            }
        });
    </script>
</body>
</html>
