<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>CCTV 频道名称替换工具</title>
<style>
    body {
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: linear-gradient(135deg, #f0f4ff, #ffffff);
        margin: 0;
        padding: 30px;
    }

    .container {
        max-width: 800px;
        margin: auto;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        padding: 25px;
    }

    h1 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
    }

    textarea {
        width: 100%;
        height: 220px;
        resize: vertical;
        padding: 12px;
        font-size: 15px;
        border-radius: 8px;
        border: 1px solid #ccc;
        box-sizing: border-box;
    }

    .buttons {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin: 20px 0;
    }

    button {
        padding: 10px 22px;
        font-size: 15px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .replace-btn { background-color: #2b6cb0; color: white; }
    .copy-btn { background-color: #38a169; color: white; }
    .clear-btn { background-color: #e53e3e; color: white; }

    button:hover { opacity: 0.85; }

    label {
        font-weight: bold;
        margin-top: 15px;
        display: block;
        color: #444;
    }
</style>
</head>

<body>
<div class="container">
    <h1>📺 CCTV 频道名称替换工具</h1>

    <label for="inputText">原始文本</label>
    <textarea id="inputText" placeholder="粘贴包含 CCTV1、CCTV2、CCTV5+ 等内容..."></textarea>

    <div class="buttons">
        <button class="replace-btn" onclick="replaceText()">🔁 替换</button>
        <button class="copy-btn" onclick="copyText()">📋 复制结果</button>
        <button class="clear-btn" onclick="clearAll()">🧹 清空</button>
    </div>

    <label for="outputText">替换后的文本</label>
    <textarea id="outputText" readonly placeholder="替换结果将显示在这里..."></textarea>
</div>

<script>
    const map = [
        ["CCTV1", "CCTV-1综合"],
        ["CCTV2", "CCTV-2财经"],
        ["CCTV3", "CCTV-3综艺"],
        ["CCTV4", "CCTV-4中文国际"],
        ["CCTV5", "CCTV-5体育"],
        ["CCTV5+", "CCTV-5+体育赛事"],
        ["CCTV6", "CCTV-6电影"],
        ["CCTV7", "CCTV-7国防军事"],
        ["CCTV8", "CCTV-8电视剧"],
        ["CCTV9", "CCTV-9纪录"],
        ["CCTV10", "CCTV-10科教"],
        ["CCTV11", "CCTV-11戏曲"],
        ["CCTV12", "CCTV-12社会与法"],
        ["CCTV13", "CCTV-13新闻"],
        ["CCTV14", "CCTV-14少儿"],
        ["CCTV15", "CCTV-15音乐"],
        ["CCTV16", "CCTV-16奥林匹克"],
        ["CCTV17", "CCTV-17农业农村"]
    ];

    function replaceText() {
        let text = document.getElementById("inputText").value;

        const sortedMap = [...map].sort((a, b) => b[0].length - a[0].length);

        sortedMap.forEach(([oldVal, newVal]) => {
            const reg = new RegExp(oldVal.replace("+", "\\+"), "g");
            text = text.replace(reg, newVal);
        });

        document.getElementById("outputText").value = text;
    }

    function copyText() {
        const output = document.getElementById("outputText");
        output.select();
        output.setSelectionRange(0, 99999);
        document.execCommand("copy");
        alert("✅ 已复制到剪贴板");
    }

    function clearAll() {
        document.getElementById("inputText").value = "";
        document.getElementById("outputText").value = "";
    }
</script>
</body>
</html>
