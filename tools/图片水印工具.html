<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片水印工具 - Image Watermark Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --card-border: #334155;
            --text: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background Effects */
        .bg-effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-gradient-1 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            top: -200px;
            right: -100px;
            animation: float 15s ease-in-out infinite;
        }

        .bg-gradient-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            bottom: -150px;
            left: -100px;
            animation: float 20s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.3);
        }

        .logo-icon svg {
            width: 28px;
            height: 28px;
            color: white;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Main Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Card */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title svg {
            width: 20px;
            height: 20px;
            color: var(--primary);
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed var(--card-border);
            border-radius: 16px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .upload-area.loading {
            pointer-events: none;
            opacity: 0.7;
        }
        
        .upload-area.loading::after {
            content: '正在加载...';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(99, 102, 241, 0.9);
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            transform: scale(1.02);
        }

        .upload-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .upload-icon svg {
            width: 32px;
            height: 32px;
            color: var(--primary);
        }

        .upload-text {
            font-size: 1rem;
            color: var(--text);
            margin-bottom: 8px;
        }

        .upload-hint {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        #fileInput {
            display: none;
        }

        /* Preview */
        .preview-container {
            display: none;
            margin-top: 24px;
        }

        .preview-container.active {
            display: block;
        }

        .preview-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: #0f172a;
        }

        #previewCanvas {
            width: 100%;
            display: block;
            border-radius: 12px;
        }

        /* Watermark Options Panel */
        .options-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Tab Buttons */
        .tab-buttons {
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px;
            border-radius: 12px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: var(--text);
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Range Slider */
        .range-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .range-group input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 3px;
            cursor: pointer;
        }

        .range-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .range-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        .range-value {
            min-width: 48px;
            text-align: right;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Color Picker */
        .color-picker-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input[type="color"] {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: transparent;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border-radius: 10px;
            border: 2px solid var(--card-border);
        }

        /* Position Grid */
        .position-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .position-btn {
            padding: 10px;
            border: 1px solid var(--card-border);
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.8rem;
        }

        .position-btn:hover {
            border-color: var(--primary);
            color: var(--text);
        }

        .position-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* Upload Watermark Image */
        .watermark-upload {
            border: 1px dashed var(--card-border);
            border-radius: 10px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .watermark-upload:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .watermark-upload input {
            display: none;
        }

        .watermark-upload-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .watermark-preview {
            margin-top: 12px;
            display: none;
        }

        .watermark-preview.active {
            display: block;
        }

        .watermark-preview img {
            max-width: 100%;
            max-height: 80px;
            border-radius: 8px;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn svg {
            width: 20px;
            height: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
            color: white;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(0, 0, 0, 0.3);
            color: var(--text);
            border: 1px solid var(--card-border);
        }

        .btn-secondary:hover {
            background: rgba(0, 0, 0, 0.4);
            border-color: var(--text-secondary);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--success);
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 32px rgba(34, 197, 94, 0.3);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast svg {
            width: 20px;
            height: 20px;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 48px;
            padding: 24px;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="bg-effects">
        <div class="bg-gradient-1"></div>
        <div class="bg-gradient-2"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
            </div>
            <h1>图片水印工具</h1>
            <p class="subtitle">轻松为您的图片添加文字或图片水印</p>
        </header>

        <div class="main-layout">
            <!-- Main Content Area -->
            <div class="card">
                <div class="card-title">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    图片预览
                </div>

                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" accept="image/*">
                    <div class="upload-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </div>
                    <p class="upload-text">点击或拖拽上传图片</p>
                    <p class="upload-hint">支持 JPG、PNG、WebP 格式</p>
                </div>

                <div class="preview-container" id="previewContainer">
                    <div class="preview-wrapper">
                        <canvas id="previewCanvas"></canvas>
                    </div>
                </div>
            </div>

            <!-- Options Panel -->
            <div class="card options-panel">
                <div class="card-title">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    水印设置
                </div>

                <!-- Tab Buttons -->
                <div class="tab-buttons">
                    <button class="tab-btn active" data-tab="text">文字水印</button>
                    <button class="tab-btn" data-tab="image">图片水印</button>
                </div>

                <!-- Text Watermark Tab -->
                <div class="tab-content active" id="textTab">
                    <div class="form-group">
                        <label>水印文字</label>
                        <input type="text" id="watermarkText" placeholder="输入水印文字" value="Watermark">
                    </div>

                    <div class="form-group">
                        <label>字体大小</label>
                        <div class="range-group">
                            <input type="range" id="fontSize" min="12" max="72" value="32">
                            <span class="range-value" id="fontSizeValue">32px</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>文字颜色</label>
                        <div class="color-picker-group">
                            <input type="color" id="textColor" value="#ffffff">
                            <input type="text" id="textColorHex" value="#ffffff" style="flex:1">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>透明度</label>
                        <div class="range-group">
                            <input type="range" id="textOpacity" min="10" max="100" value="70">
                            <span class="range-value" id="textOpacityValue">70%</span>
                        </div>
                    </div>
                </div>

                <!-- Image Watermark Tab -->
                <div class="tab-content" id="imageTab">
                    <div class="form-group">
                        <label>上传水印图片</label>
                        <div class="watermark-upload" id="watermarkUpload">
                            <input type="file" id="watermarkImageInput" accept="image/*">
                            <p class="watermark-upload-text">点击上传 PNG 水印图片</p>
                            <div class="watermark-preview" id="watermarkPreview">
                                <img id="watermarkPreviewImg" alt="水印预览">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>水印大小</label>
                        <div class="range-group">
                            <input type="range" id="watermarkSize" min="10" max="100" value="30">
                            <span class="range-value" id="watermarkSizeValue">30%</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>透明度</label>
                        <div class="range-group">
                            <input type="range" id="imageOpacity" min="10" max="100" value="70">
                            <span class="range-value" id="imageOpacityValue">70%</span>
                        </div>
                    </div>
                </div>

                <!-- Common Settings -->
                <div class="form-group">
                    <label>水印位置</label>
                    <div class="position-grid">
                        <button class="position-btn" data-pos="top-left">左上</button>
                        <button class="position-btn" data-pos="top-center">上中</button>
                        <button class="position-btn" data-pos="top-right">右上</button>
                        <button class="position-btn" data-pos="center-left">左中</button>
                        <button class="position-btn active" data-pos="center">居中</button>
                        <button class="position-btn" data-pos="center-right">右中</button>
                        <button class="position-btn" data-pos="bottom-left">左下</button>
                        <button class="position-btn" data-pos="bottom-center">下中</button>
                        <button class="position-btn" data-pos="bottom-right">右下</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>边距</label>
                    <div class="range-group">
                        <input type="range" id="padding" min="0" max="100" value="20">
                        <span class="range-value" id="paddingValue">20px</span>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button class="btn btn-secondary" id="resetBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="1 4 1 10 7 10"/>
                            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                        </svg>
                        重置
                    </button>
                    <button class="btn btn-primary" id="downloadBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        下载
                    </button>
                </div>
            </div>
        </div>

        <footer>
            <p>图片水印工具 - 安全、快捷、免费</p>
        </footer>
    </div>

    <div class="toast" id="toast">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span id="toastMessage">操作成功！</span>
    </div>

    <script>
        // State
        let originalImage = null;
        let watermarkImage = null;
        let currentTab = 'text';
        let position = 'center';
        let isDrawing = false;

        // Elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewCanvas = document.getElementById('previewCanvas');
        const previewContainer = document.getElementById('previewContainer');
        const ctx = previewCanvas.getContext('2d');

        // Text watermark elements
        const watermarkTextInput = document.getElementById('watermarkText');
        const fontSizeInput = document.getElementById('fontSize');
        const fontSizeValue = document.getElementById('fontSizeValue');
        const textColorInput = document.getElementById('textColor');
        const textColorHex = document.getElementById('textColorHex');
        const textOpacityInput = document.getElementById('textOpacity');
        const textOpacityValue = document.getElementById('textOpacityValue');

        // Image watermark elements
        const watermarkUpload = document.getElementById('watermarkUpload');
        const watermarkImageInput = document.getElementById('watermarkImageInput');
        const watermarkPreview = document.getElementById('watermarkPreview');
        const watermarkPreviewImg = document.getElementById('watermarkPreviewImg');
        const watermarkSizeInput = document.getElementById('watermarkSize');
        const watermarkSizeValue = document.getElementById('watermarkSizeValue');
        const imageOpacityInput = document.getElementById('imageOpacity');
        const imageOpacityValue = document.getElementById('imageOpacityValue');

        // Common elements
        const paddingInput = document.getElementById('padding');
        const paddingValue = document.getElementById('paddingValue');
        const resetBtn = document.getElementById('resetBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        // Tab functionality
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                document.getElementById(currentTab + 'Tab').classList.add('active');
                drawCanvas();
            });
        });

        // Position buttons
        document.querySelectorAll('.position-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.position-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                position = btn.dataset.pos;
                drawCanvas();
            });
        });

        // Upload area click
        uploadArea.addEventListener('click', () => fileInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                loadImage(file);
            }
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                loadImage(file);
            }
        });

        // Load image
        function loadImage(file) {
            // Show loading state
            uploadArea.classList.add('loading');
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    
                    // Show preview container first to get correct dimensions
                    uploadArea.style.display = 'none';
                    previewContainer.classList.add('active');
                    
                    // Wait for DOM to update, then calculate canvas size
                    requestAnimationFrame(() => {
                        const containerWidth = previewContainer.clientWidth || 600;
                        const maxWidth = Math.min(containerWidth - 4, 800); // Account for padding and border
                        let displayWidth = img.width;
                        let displayHeight = img.height;
                        
                        // Scale down if needed
                        if (displayWidth > maxWidth) {
                            const ratio = maxWidth / displayWidth;
                            displayWidth = maxWidth;
                            displayHeight = img.height * ratio;
                        }
                        
                        // Ensure minimum size
                        displayWidth = Math.max(displayWidth, 200);
                        displayHeight = Math.max(displayHeight, 150);
                        
                        previewCanvas.width = displayWidth;
                        previewCanvas.height = displayHeight;
                        
                        // Set canvas style for display
                        previewCanvas.style.width = displayWidth + 'px';
                        previewCanvas.style.height = displayHeight + 'px';
                        
                        uploadArea.classList.remove('loading');
                        drawCanvas();
                    });
                };
                img.onerror = () => {
                    uploadArea.classList.remove('loading');
                    showToast('图片加载失败');
                };
                img.src = e.target.result;
            };
            reader.onerror = () => {
                uploadArea.classList.remove('loading');
                showToast('读取文件失败');
            };
            reader.readAsDataURL(file);
        }

        // Draw canvas
        function drawCanvas() {
            if (!originalImage) return;
            
            ctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
            
            // Draw original image
            ctx.drawImage(originalImage, 0, 0, previewCanvas.width, previewCanvas.height);
            
            // Draw watermark
            if (currentTab === 'text') {
                drawTextWatermark();
            } else if (watermarkImage) {
                drawImageWatermark();
            }
        }

        // Draw text watermark
        function drawTextWatermark() {
            const text = watermarkTextInput.value || 'Watermark';
            const fontSize = parseInt(fontSizeInput.value);
            const color = textColorHex.value;
            const opacity = parseInt(textOpacityInput.value) / 100;
            const padding = parseInt(paddingInput.value);
            
            ctx.font = `${fontSize}px Inter, sans-serif`;
            ctx.fillStyle = hexToRgba(color, opacity);
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';
            
            const metrics = ctx.measureText(text);
            const textWidth = metrics.width;
            const textHeight = fontSize;
            
            let x, y;
            const canvasWidth = previewCanvas.width;
            const canvasHeight = previewCanvas.height;
            
            // Calculate position based on selected position
            switch (position) {
                case 'top-left':
                    x = padding + textWidth / 2;
                    y = padding + textHeight / 2;
                    ctx.textAlign = 'left';
                    break;
                case 'top-center':
                    x = canvasWidth / 2;
                    y = padding + textHeight / 2;
                    break;
                case 'top-right':
                    x = canvasWidth - padding - textWidth / 2;
                    y = padding + textHeight / 2;
                    ctx.textAlign = 'right';
                    break;
                case 'center-left':
                    x = padding + textWidth / 2;
                    y = canvasHeight / 2;
                    ctx.textAlign = 'left';
                    break;
                case 'center':
                    x = canvasWidth / 2;
                    y = canvasHeight / 2;
                    break;
                case 'center-right':
                    x = canvasWidth - padding - textWidth / 2;
                    y = canvasHeight / 2;
                    ctx.textAlign = 'right';
                    break;
                case 'bottom-left':
                    x = padding + textWidth / 2;
                    y = canvasHeight - padding - textHeight / 2;
                    ctx.textAlign = 'left';
                    break;
                case 'bottom-center':
                    x = canvasWidth / 2;
                    y = canvasHeight - padding - textHeight / 2;
                    break;
                case 'bottom-right':
                    x = canvasWidth - padding - textWidth / 2;
                    y = canvasHeight - padding - textHeight / 2;
                    ctx.textAlign = 'right';
                    break;
            }
            
            // Add shadow for better visibility
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 4;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            
            ctx.fillText(text, x, y);
            
            // Reset shadow
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
        }

        // Draw image watermark
        function drawImageWatermark() {
            const size = parseInt(watermarkSizeInput.value) / 100;
            const opacity = parseInt(imageOpacityInput.value) / 100;
            const padding = parseInt(paddingInput.value);
            
            const wmWidth = previewCanvas.width * size;
            const wmHeight = (watermarkImage.height / watermarkImage.width) * wmWidth;
            
            let x, y;
            const canvasWidth = previewCanvas.width;
            const canvasHeight = previewCanvas.height;
            
            switch (position) {
                case 'top-left':
                    x = padding;
                    y = padding;
                    break;
                case 'top-center':
                    x = (canvasWidth - wmWidth) / 2;
                    y = padding;
                    break;
                case 'top-right':
                    x = canvasWidth - wmWidth - padding;
                    y = padding;
                    break;
                case 'center-left':
                    x = padding;
                    y = (canvasHeight - wmHeight) / 2;
                    break;
                case 'center':
                    x = (canvasWidth - wmWidth) / 2;
                    y = (canvasHeight - wmHeight) / 2;
                    break;
                case 'center-right':
                    x = canvasWidth - wmWidth - padding;
                    y = (canvasHeight - wmHeight) / 2;
                    break;
                case 'bottom-left':
                    x = padding;
                    y = canvasHeight - wmHeight - padding;
                    break;
                case 'bottom-center':
                    x = (canvasWidth - wmWidth) / 2;
                    y = canvasHeight - wmHeight - padding;
                    break;
                case 'bottom-right':
                    x = canvasWidth - wmWidth - padding;
                    y = canvasHeight - wmHeight - padding;
                    break;
            }
            
            ctx.globalAlpha = opacity;
            ctx.drawImage(watermarkImage, x, y, wmWidth, wmHeight);
            ctx.globalAlpha = 1;
        }

        // Hex to RGBA
        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // Watermark image upload
        watermarkUpload.addEventListener('click', () => watermarkImageInput.click());
        
        watermarkImageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        watermarkImage = img;
                        watermarkPreviewImg.src = e.target.result;
                        watermarkPreview.classList.add('active');
                        drawCanvas();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // Event listeners for text watermark controls
        watermarkTextInput.addEventListener('input', drawCanvas);
        fontSizeInput.addEventListener('input', () => {
            fontSizeValue.textContent = fontSizeInput.value + 'px';
            drawCanvas();
        });
        textColorInput.addEventListener('input', () => {
            textColorHex.value = textColorInput.value;
            drawCanvas();
        });
        textColorHex.addEventListener('input', () => {
            textColorInput.value = textColorHex.value;
            drawCanvas();
        });
        textOpacityInput.addEventListener('input', () => {
            textOpacityValue.textContent = textOpacityInput.value + '%';
            drawCanvas();
        });

        // Event listeners for image watermark controls
        watermarkSizeInput.addEventListener('input', () => {
            watermarkSizeValue.textContent = watermarkSizeInput.value + '%';
            drawCanvas();
        });
        imageOpacityInput.addEventListener('input', () => {
            imageOpacityValue.textContent = imageOpacityInput.value + '%';
            drawCanvas();
        });

        // Common controls
        paddingInput.addEventListener('input', () => {
            paddingValue.textContent = paddingInput.value + 'px';
            drawCanvas();
        });

        // Reset button
        resetBtn.addEventListener('click', () => {
            if (originalImage) {
                uploadArea.style.display = 'block';
                previewContainer.classList.remove('active');
                originalImage = null;
                fileInput.value = '';
            }
        });

        // Download button
        downloadBtn.addEventListener('click', () => {
            if (!originalImage) {
                showToast('请先上传图片');
                return;
            }
            
            // Create a new canvas with original image size
            const downloadCanvas = document.createElement('canvas');
            const downloadCtx = downloadCanvas.getContext('2d');
            downloadCanvas.width = originalImage.width;
            downloadCanvas.height = originalImage.height;
            
            // Draw original image
            downloadCtx.drawImage(originalImage, 0, 0);
            
            // Draw watermark
            if (currentTab === 'text') {
                const text = watermarkTextInput.value || 'Watermark';
                const fontSize = parseInt(fontSizeInput.value) * (originalImage.width / previewCanvas.width);
                const color = textColorHex.value;
                const opacity = parseInt(textOpacityInput.value) / 100;
                const padding = parseInt(paddingInput.value) * (originalImage.width / previewCanvas.width);
                
                downloadCtx.font = `${fontSize}px Inter, sans-serif`;
                downloadCtx.fillStyle = hexToRgba(color, opacity);
                downloadCtx.textBaseline = 'middle';
                downloadCtx.textAlign = 'center';
                
                const metrics = downloadCtx.measureText(text);
                const textWidth = metrics.width;
                const textHeight = fontSize;
                
                let x, y;
                const canvasWidth = downloadCanvas.width;
                const canvasHeight = downloadCanvas.height;
                
                switch (position) {
                    case 'top-left':
                        x = padding + textWidth / 2;
                        y = padding + textHeight / 2;
                        downloadCtx.textAlign = 'left';
                        break;
                    case 'top-center':
                        x = canvasWidth / 2;
                        y = padding + textHeight / 2;
                        break;
                    case 'top-right':
                        x = canvasWidth - padding - textWidth / 2;
                        y = padding + textHeight / 2;
                        downloadCtx.textAlign = 'right';
                        break;
                    case 'center-left':
                        x = padding + textWidth / 2;
                        y = canvasHeight / 2;
                        downloadCtx.textAlign = 'left';
                        break;
                    case 'center':
                        x = canvasWidth / 2;
                        y = canvasHeight / 2;
                        break;
                    case 'center-right':
                        x = canvasWidth - padding - textWidth / 2;
                        y = canvasHeight / 2;
                        downloadCtx.textAlign = 'right';
                        break;
                    case 'bottom-left':
                        x = padding + textWidth / 2;
                        y = canvasHeight - padding - textHeight / 2;
                        downloadCtx.textAlign = 'left';
                        break;
                    case 'bottom-center':
                        x = canvasWidth / 2;
                        y = canvasHeight - padding - textHeight / 2;
                        break;
                    case 'bottom-right':
                        x = canvasWidth - padding - textWidth / 2;
                        y = canvasHeight - padding - textHeight / 2;
                        downloadCtx.textAlign = 'right';
                        break;
                }
                
                downloadCtx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                downloadCtx.shadowBlur = 4;
                downloadCtx.shadowOffsetX = 2;
                downloadCtx.shadowOffsetY = 2;
                
                downloadCtx.fillText(text, x, y);
            } else if (watermarkImage) {
                const size = parseInt(watermarkSizeInput.value) / 100;
                const opacity = parseInt(imageOpacityInput.value) / 100;
                const padding = parseInt(paddingInput.value) * (originalImage.width / previewCanvas.width);
                
                const wmWidth = downloadCanvas.width * size;
                const wmHeight = (watermarkImage.height / watermarkImage.width) * wmWidth;
                
                let x, y;
                const canvasWidth = downloadCanvas.width;
                const canvasHeight = downloadCanvas.height;
                
                switch (position) {
                    case 'top-left':
                        x = padding;
                        y = padding;
                        break;
                    case 'top-center':
                        x = (canvasWidth - wmWidth) / 2;
                        y = padding;
                        break;
                    case 'top-right':
                        x = canvasWidth - wmWidth - padding;
                        y = padding;
                        break;
                    case 'center-left':
                        x = padding;
                        y = (canvasHeight - wmHeight) / 2;
                        break;
                    case 'center':
                        x = (canvasWidth - wmWidth) / 2;
                        y = (canvasHeight - wmHeight) / 2;
                        break;
                    case 'center-right':
                        x = canvasWidth - wmWidth - padding;
                        y = (canvasHeight - wmHeight) / 2;
                        break;
                    case 'bottom-left':
                        x = padding;
                        y = canvasHeight - wmHeight - padding;
                        break;
                    case 'bottom-center':
                        x = (canvasWidth - wmWidth) / 2;
                        y = canvasHeight - wmHeight - padding;
                        break;
                    case 'bottom-right':
                        x = canvasWidth - wmWidth - padding;
                        y = canvasHeight - wmHeight - padding;
                        break;
                }
                
                downloadCtx.globalAlpha = opacity;
                downloadCtx.drawImage(watermarkImage, x, y, wmWidth, wmHeight);
                downloadCtx.globalAlpha = 1;
            }
            
            // Download
            const link = document.createElement('a');
            link.download = 'watermarked-image.png';
            link.href = downloadCanvas.toDataURL('image/png');
            link.click();
            
            showToast('图片下载成功！');
        });

        // Toast notification
        function showToast(message) {
            toastMessage.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            if (originalImage) {
                const containerWidth = previewContainer.clientWidth || 600;
                const maxWidth = Math.min(containerWidth - 4, 800);
                let displayWidth = originalImage.width;
                let displayHeight = originalImage.height;
                
                if (displayWidth > maxWidth) {
                    const ratio = maxWidth / displayWidth;
                    displayWidth = maxWidth;
                    displayHeight = originalImage.height * ratio;
                }
                
                displayWidth = Math.max(displayWidth, 200);
                displayHeight = Math.max(displayHeight, 150);
                
                previewCanvas.width = displayWidth;
                previewCanvas.height = displayHeight;
                previewCanvas.style.width = displayWidth + 'px';
                previewCanvas.style.height = displayHeight + 'px';
                
                drawCanvas();
            }
        });
    </script>
</body>
</html>
